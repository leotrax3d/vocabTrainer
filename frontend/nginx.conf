server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Statische App ausliefern.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API an das Backend weiterreichen. Gleicher Origin wie das Frontend,
    # daher ist kein CORS noetig. Der Docker-DNS-Resolver (127.0.0.11) und
    # die Variable sorgen dafuer, dass nginx auch dann startet, wenn das
    # Backend kurz nach dem Frontend hochfaehrt.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend http://backend:3000;
        proxy_pass $backend$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
